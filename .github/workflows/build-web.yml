name: NasTech AI — Flutter Web Build

on:
  push:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'assets/**'
      - 'web/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'l10n.yaml'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  build-web:
    name: Build Flutter Web (com.nastechai.app)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Inject fallback secrets
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: |
          flutter build web \
            --release \
            --base-href / \
            --dart-define=APP_NAME="NasTech AI" \
            --dart-define=APP_PACKAGE_ID="com.nastechai.app" \
            --dart-define=APP_VERSION="${{ github.ref_name }}"

      - name: Stamp build metadata
        run: |
          cat > build/web/build-info.json <<EOF
          {
            "app": "NasTech AI",
            "packageId": "com.nastechai.app",
            "version": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "branch": "${{ github.ref_name }}"
          }
          EOF

      - name: Commit and push build/web to repo
        run: |
          git config user.name  "NasTech AI CI"
          git config user.email "ci@nastechai.com"
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          # Save freshly built files before any git operations
          cp -r build/web /tmp/web_build_artifact

          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            # Always start from the latest remote state
            git fetch origin master
            git reset --hard origin/master

            # Restore the freshly built files on top of latest master
            cp -r /tmp/web_build_artifact/. build/web/

            git add -f build/web/
            if git diff --staged --quiet; then
              echo "No changes to commit — web build is identical to master."
              exit 0
            fi

            git commit -m "chore(web): Flutter web build [com.nastechai.app] [skip ci]"

            if git push origin master; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi

            echo "Push rejected on attempt $i/$MAX_RETRIES — another runner pushed first. Retrying in $((i * 3))s..."
            git reset --soft HEAD^
            sleep $((i * 3))
          done

          echo "All $MAX_RETRIES push attempts failed."
          exit 1
