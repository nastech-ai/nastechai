name: Release Notes Bot

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: [master, main]

permissions:
  pull-requests: write

jobs:
  check-release-notes:
    name: Enforce PR description
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body is not empty
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            if (body.trim().length < 20) {
              core.setFailed(
                'PR description is too short. Please describe what changed and why.'
              );
            } else {
              core.info('PR description looks good.');
            }
