name: Android Build тАФ NasTech AI

on:
  push:
    branches:
      - Android
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Override release tag (leave blank to use pubspec version)'
        required: false
        default: ''
        type: string

env:
  FLUTTER_CHANNEL: 'master'

jobs:
  build-android:
    name: ЁЯдЦ Build & Release Android APK
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: ЁЯУж Checkout Android branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: тШХ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: ЁЯРж Install Flutter (master channel)
        uses: subosito/flutter-action@v2
        with:
          channel: master
          cache: true

      - name: ЁЯФС Inject secrets fallback
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: ЁЯУЭ Read version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION_NAME=$(echo "$VERSION" | cut -d'+' -f1)
          VERSION_CODE=$(echo "$VERSION" | cut -d'+' -f2)
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="v${VERSION_NAME}"
          fi
          echo "VERSION=$VERSION"           >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "RELEASE_TAG=$TAG"           >> $GITHUB_ENV
          echo "тЬЕ Version: $VERSION_NAME+$VERSION_CODE  тЖТ  Release tag: $TAG"

      - name: ЁЯФП Configure signing (if secrets are set)
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$SIGN_KEYSTORE_BASE64" ]; then
            KEYSTORE_ABS="$(pwd)/android/app/key.jks"
            echo "$SIGN_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_ABS"
            {
              echo "storeFile=${KEYSTORE_ABS}"
              echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
              echo "keyAlias=${{ secrets.KEY_ALIAS }}"
              echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
            } > android/key.properties
            echo "тЬЕ Signing keystore configured тАФ APKs will be signed"
          else
            echo "тД╣я╕П  No signing secrets тАФ building unsigned release APKs"
          fi

      - name: ЁЯПЧя╕П Build split APKs (per ABI)
        run: flutter build apk --release --split-per-abi

      - name: ЁЯПЧя╕П Build universal APK
        run: flutter build apk --release

      - name: ЁЯУж Rename APKs to NasTech AI brand
        run: |
          cd build/app/outputs/flutter-apk
          for file in app-*-release.apk; do
            abi=$(echo "$file" | sed -E 's/app-(.*)-release\.apk/\1/')
            mv "$file" "NasTech_AI_${VERSION_NAME}_android_${abi}.apk"
          done
          [ -f app-release.apk ] && mv app-release.apk "NasTech_AI_${VERSION_NAME}_android_universal.apk"
          echo "=== Built APKs ==="
          ls -lh *.apk

      - name: ЁЯЪА Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "NasTech AI ${{ env.RELEASE_TAG }}"
          body: |
            ## NasTech AI ${{ env.RELEASE_TAG }} тАФ Android

            **Built from branch:** `Android`
            **Version code:** ${{ env.VERSION_CODE }}
            **Commit:** ${{ github.sha }}

            ---

            ### ЁЯУ▓ Which APK should I download?

            | File | Best for |
            |---|---|
            | `тАж_arm64-v8a.apk` | тЬЕ Most modern phones (2017+) |
            | `тАж_armeabi-v7a.apk` | Older / 32-bit phones |
            | `тАж_x86_64.apk` | Emulators / Intel Chromebooks |
            | `тАж_universal.apk` | Any device (larger file) |

            > **Tip:** Download **arm64-v8a** unless your device is very old.

            ---

            ### тЪб NasTech Agent
            Connect your own NasTech Agent: **Settings тЖТ NasTech Agent** тЖТ enter your agent URL.
          draft: false
          prerelease: false
          files: build/app/outputs/flutter-apk/NasTech_AI_*_android_*.apk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ЁЯУд Also upload as workflow artifact (30-day backup)
        uses: actions/upload-artifact@v4
        with:
          name: NasTech-AI-${{ env.VERSION_NAME }}-android-apks
          path: build/app/outputs/flutter-apk/NasTech_AI_*_android_*.apk
          retention-days: 30

      - name: ЁЯУК Build summary
        run: |
          echo "## тЬЕ NasTech AI Android Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** [${{ env.RELEASE_TAG }}](https://github.com/${{ github.repository }}/releases/tag/${{ env.RELEASE_TAG }})" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** \`com.nastechai.app\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ env.VERSION_NAME }}+${{ env.VERSION_CODE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          for f in build/app/outputs/flutter-apk/NasTech_AI_*_android_*.apk; do
            SIZE=$(du -sh "$f" | cut -f1)
            NAME=$(basename "$f")
            echo "| \`$NAME\` | $SIZE |" >> $GITHUB_STEP_SUMMARY
          done
