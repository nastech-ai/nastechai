name: 🤖 Security & Dependency Audit Bot

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  audit:
    name: Flutter dependency & security audit
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Inject fallback key
        run: |
          mkdir -p lib/secrets
          echo "const String siliconflowFallbackKey = '';" > lib/secrets/fallback.dart

      - name: Flutter pub get
        run: flutter pub get

      - name: Run dart analyze
        id: analyze
        run: |
          flutter analyze --no-fatal-infos 2>&1 | tee /tmp/analyze.txt || true
          ISSUES=$(grep -c "error\|warning" /tmp/analyze.txt || echo "0")
          echo "issue_count=$ISSUES" >> $GITHUB_OUTPUT
          echo "## 🔍 Dart Analyze Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/analyze.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check for outdated dependencies
        id: outdated
        run: |
          flutter pub outdated --no-color 2>&1 | tee /tmp/outdated.txt || true
          OUTDATED=$(grep -c "major\|minor" /tmp/outdated.txt || echo "0")
          echo "outdated_count=$OUTDATED" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Outdated Dependencies" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/outdated.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run pub audit (security vulnerabilities)
        id: pubaudit
        run: |
          flutter pub audit 2>&1 | tee /tmp/audit.txt || true
          VULNS=$(grep -c "vulnerability\|Vulnerability" /tmp/audit.txt || echo "0")
          echo "vuln_count=$VULNS" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔒 Security Audit" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/audit.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check for hardcoded secrets
        id: secrets_check
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔑 Hardcoded Secret Scan" >> $GITHUB_STEP_SUMMARY
          FOUND=0

          SECRET_PATTERNS=(
            "sk-[a-zA-Z0-9]{20,}"
            "AIza[a-zA-Z0-9_-]{35}"
            "AKIA[A-Z0-9]{16}"
            "password\s*=\s*['\"][^'\"]{8,}"
            "api_key\s*=\s*['\"][^'\"]{8,}"
          )

          for PATTERN in "${SECRET_PATTERNS[@]}"; do
            MATCHES=$(grep -rn --include="*.dart" -E "$PATTERN" lib/ 2>/dev/null | \
              grep -v "fallback.dart" | grep -v "//" || true)
            if [ -n "$MATCHES" ]; then
              echo "⚠️ Potential secret pattern found: \`$PATTERN\`" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$MATCHES" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              FOUND=$((FOUND + 1))
            fi
          done

          if [ "$FOUND" -eq 0 ]; then
            echo "✅ No hardcoded secret patterns detected in lib/" >> $GITHUB_STEP_SUMMARY
          fi
          echo "found_count=$FOUND" >> $GITHUB_OUTPUT

      - name: Build audit summary
        id: summary
        run: |
          VULNS="${{ steps.pubaudit.outputs.vuln_count }}"
          OUTDATED="${{ steps.outdated.outputs.outdated_count }}"
          ISSUES="${{ steps.analyze.outputs.issue_count }}"
          SECRETS="${{ steps.secrets_check.outputs.found_count }}"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Count | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security vulnerabilities | $VULNS | $([ "$VULNS" -gt 0 ] && echo '❌' || echo '✅') |" >> $GITHUB_STEP_SUMMARY
          echo "| Outdated packages | $OUTDATED | $([ "$OUTDATED" -gt 10 ] && echo '⚠️' || echo '✅') |" >> $GITHUB_STEP_SUMMARY
          echo "| Dart analyze issues | $ISSUES | $([ "$ISSUES" -gt 0 ] && echo '⚠️' || echo '✅') |" >> $GITHUB_STEP_SUMMARY
          echo "| Hardcoded secrets | $SECRETS | $([ "$SECRETS" -gt 0 ] && echo '❌' || echo '✅') |" >> $GITHUB_STEP_SUMMARY

          NEEDS_ISSUE=false
          [ "$VULNS" -gt 0 ] && NEEDS_ISSUE=true
          [ "$SECRETS" -gt 0 ] && NEEDS_ISSUE=true
          echo "needs_issue=$NEEDS_ISSUE" >> $GITHUB_OUTPUT

      - name: Open GitHub issue if critical findings
        if: steps.summary.outputs.needs_issue == 'true'
        env:
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          VULNS: ${{ steps.pubaudit.outputs.vuln_count }}
          SECRETS_FOUND: ${{ steps.secrets_check.outputs.found_count }}
          GH_TOKEN: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, os
          from datetime import date

          repo    = os.environ['REPO']
          run_id  = os.environ['RUN_ID']
          vulns   = os.environ['VULNS']
          secrets = os.environ['SECRETS_FOUND']
          token   = os.environ['GH_TOKEN']

          try:
              with open('/tmp/audit.txt') as f:
                  audit_text = f.read()[:3000]
          except Exception:
              audit_text = "(no audit output)"

          title = f"🔒 Security Audit Alert — {date.today()}"
          body  = (
              "## Security Audit Detected Critical Issues\n\n"
              "| Finding | Count |\n"
              "|---------|-------|\n"
              f"| Security vulnerabilities | {vulns} |\n"
              f"| Potential hardcoded secrets | {secrets} |\n\n"
              "### Details\n\n"
              f"```\n{audit_text}\n```\n\n"
              f"🔗 [View full audit run](https://github.com/{repo}/actions/runs/{run_id})\n\n"
              "**Action Required:** Please review and resolve the above findings immediately."
          )

          payload = json.dumps({"title": title, "body": body, "labels": ["security", "audit"]})
          result = subprocess.run(
              ["curl", "-s", "-X", "POST",
               "-H", f"Authorization: Bearer {token}",
               "-H", "Accept: application/vnd.github+json",
               f"https://api.github.com/repos/{repo}/issues",
               "-d", payload],
              capture_output=True, text=True
          )
          data = json.loads(result.stdout)
          print("Issue:", data.get("html_url", "error: " + str(data)[:100]))
          PYEOF
