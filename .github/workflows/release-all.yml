name: Release All Platforms

env:
  FLUTTER_VERSION: '3.44.1'
  APP_NAME: 'NasTech AI'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.2.0)'
        required: true
        default: ''
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
      draft:
        description: 'Create as draft release'
        required: false
        default: false
        type: boolean

jobs:
  # ─────────────────────────────────────────────
  # Resolve tag / version used by all jobs
  # ─────────────────────────────────────────────
  meta:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      draft: ${{ steps.resolve.outputs.draft }}
    steps:
      - name: Resolve tag and version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            PRERELEASE="false"
            DRAFT="false"
          else
            TAG="${{ github.event.inputs.release_tag }}"
            PRERELEASE="${{ github.event.inputs.prerelease }}"
            DRAFT="${{ github.event.inputs.draft }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "draft=$DRAFT"     >> $GITHUB_OUTPUT
          echo "Resolved tag=$TAG version=$VERSION"

  # ─────────────────────────────────────────────
  # Android — APK (split ABI) + AAB
  # ─────────────────────────────────────────────
  android:
    name: Android (APK + AAB)
    needs: meta
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Inject fallback key
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Write signing keystore
        if: ${{ env.SIGN_KEYSTORE_BASE64 != '' }}
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_ABS="$(pwd)/android/app/key.jks"
          echo "$SIGN_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_ABS"
          echo "storeFile=${KEYSTORE_ABS}"                        > android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"  >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}"               >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}"         >> android/key.properties
          echo "✅ Production keystore written with absolute path: $KEYSTORE_ABS"

      - name: Generate debug keystore (fallback — no SIGN_KEYSTORE_BASE64 set)
        if: ${{ env.SIGN_KEYSTORE_BASE64 == '' }}
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_ABS="$(pwd)/android/app/debug-ci.jks"
          keytool -genkey -v \
            -keystore "$KEYSTORE_ABS" \
            -alias nastechai \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=NasTech AI CI, OU=Dev, O=NasTech AI, L=Unknown, S=Unknown, C=US"
          echo "storeFile=${KEYSTORE_ABS}"   > android/key.properties
          echo "storePassword=android123"     >> android/key.properties
          echo "keyAlias=nastechai"           >> android/key.properties
          echo "keyPassword=android123"       >> android/key.properties
          echo "✅ Debug CI keystore written with absolute path: $KEYSTORE_ABS"
          cat android/key.properties

      - name: Build APK (split ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Verify APK signatures
        run: |
          echo "🔍 Verifying APK signatures..."
          ALL_OK=true
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            echo "--- Verifying: $apk"
            if apksigner verify --verbose "$apk" 2>&1; then
              echo "✅ Signed OK: $apk"
            else
              echo "❌ NOT SIGNED or invalid: $apk"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = "false" ]; then
            echo "❌ APK signature verification FAILED — APKs will show INSTALL_PARSE_FAILED_NO_CERTIFICATES on device"
            exit 1
          fi
          echo "✅ All APKs are properly signed"

      - name: Rename APK files
        env:
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          cd build/app/outputs/flutter-apk
          for f in app-*-release.apk; do
            abi=$(echo "$f" | sed -E 's/app-(.*)-release\.apk/\1/')
            mv "$f" "NasTech_AI_android_${TAG}_${abi}.apk"
          done

      - name: Rename AAB file
        env:
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          mv build/app/outputs/bundle/release/app-release.aab \
             "NasTech_AI_android_${TAG}.aab"

      - name: Upload APK arm64-v8a
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: Android-APK-arm64-v8a
          path: build/app/outputs/flutter-apk/NasTech_AI_android_*_arm64-v8a.apk

      - name: Upload APK armeabi-v7a
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: Android-APK-armeabi-v7a
          path: build/app/outputs/flutter-apk/NasTech_AI_android_*_armeabi-v7a.apk

      - name: Upload APK x86_64
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: Android-APK-x86_64
          path: build/app/outputs/flutter-apk/NasTech_AI_android_*_x86_64.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: Android-AAB
          path: NasTech_AI_android_*.aab

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          draft: ${{ needs.meta.outputs.draft }}
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          files: |
            build/app/outputs/flutter-apk/NasTech_AI_android_*.apk
            NasTech_AI_android_*.aab

  # ─────────────────────────────────────────────
  # iOS — IPA (no-codesign)
  # ─────────────────────────────────────────────
  ios:
    name: iOS (IPA)
    needs: meta
    runs-on: macos-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Inject fallback key
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Install CocoaPods dependencies
        run: |
          flutter pub get
          cd ios
          pod install --repo-update

      - name: Build iOS (no-codesign)
        env:
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r "../../../NasTech_AI_ios_${TAG}.ipa" Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: NasTech_AI_ios_*.ipa

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          draft: ${{ needs.meta.outputs.draft }}
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          files: NasTech_AI_ios_*.ipa

  # ─────────────────────────────────────────────
  # macOS — DMG
  # ─────────────────────────────────────────────
  macos:
    name: macOS (DMG)
    needs: meta
    runs-on: macos-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Inject fallback key
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG
        env:
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          brew install create-dmg
          create-dmg \
            --volname "NasTech AI" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "NasTech_AI_macos_${TAG}.dmg" \
            "build/macos/Build/Products/Release/nastechai.app" || true
          if [ ! -f "NasTech_AI_macos_${TAG}.dmg" ]; then
            hdiutil create \
              -volname "NasTech AI" \
              -srcfolder build/macos/Build/Products/Release/nastechai.app \
              -ov -format UDZO \
              "NasTech_AI_macos_${TAG}.dmg"
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macOS-DMG
          path: NasTech_AI_macos_*.dmg

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          draft: ${{ needs.meta.outputs.draft }}
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          files: NasTech_AI_macos_*.dmg

  # ─────────────────────────────────────────────
  # Windows — ZIP + Inno Setup installer
  # ─────────────────────────────────────────────
  windows:
    name: Windows (ZIP + Installer)
    needs: meta
    runs-on: windows-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install latest CMake
        uses: lukka/get-cmake@latest

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Inject fallback key
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create ZIP
        shell: pwsh
        env:
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          Compress-Archive `
            -Path "build/windows/x64/runner/Release/*" `
            -DestinationPath "NasTech_AI_windows_${env:TAG}.zip"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer
        shell: pwsh
        env:
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          $zhLangCompiler = "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
          $zhLangLocalDir = Join-Path (Get-Location) "Languages"
          $zhLangLocal    = Join-Path $zhLangLocalDir "ChineseSimplified.isl"
          $languagesBlock = $null

          if (Test-Path $zhLangCompiler) {
            $languagesBlock = @"
          [Languages]
          Name: "chinesesimplified"; MessagesFile: "compiler:Languages\ChineseSimplified.isl"
          Name: "english"; MessagesFile: "compiler:Default.isl"
          "@
          } else {
            try {
              New-Item -ItemType Directory -Force -Path $zhLangLocalDir | Out-Null
              $uri = 'https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/ChineseSimplified.isl'
              Invoke-WebRequest -Uri $uri -OutFile $zhLangLocal -UseBasicParsing -TimeoutSec 60
              if (Test-Path $zhLangLocal) {
                $languagesBlock = @"
          [Languages]
          Name: "chinesesimplified"; MessagesFile: "$zhLangLocal"
          Name: "english"; MessagesFile: "compiler:Default.isl"
          "@
              }
            } catch {}
            if (-not $languagesBlock) {
              $languagesBlock = @"
          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"
          "@
            }
          }

          $issContent = @"
          #define MyAppName "NasTech AI"
          #define MyAppVersion "$env:TAG"
          #define MyAppPublisher "NasTech AI"
          #define MyAppExeName "nastechai.exe"

          [Setup]
          AppId={{A7B8C9D0-E1F2-4A5B-8C9D-0E1F2A3B4C5D}}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          OutputDir=.
          OutputBaseFilename=NasTech_AI_windows_{#MyAppVersion}_setup
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesInstallIn64BitMode=x64
          ArchitecturesAllowed=x64
          UninstallDisplayIcon={app}\{#MyAppExeName}

          $languagesBlock

          [Tasks]
          Name: "desktopicon"; Description: "Create desktop shortcut"; GroupDescription: "Additional icons:"

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{group}\Uninstall {#MyAppName}"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "Launch {#MyAppName}"; Flags: nowait postinstall skipifsilent
          "@

          $issContent | Out-File -FilePath "installer.iss" -Encoding utf8BOM
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Windows-ZIP
          path: NasTech_AI_windows_*.zip

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: NasTech_AI_windows_*_setup.exe

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          draft: ${{ needs.meta.outputs.draft }}
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          files: |
            NasTech_AI_windows_*.zip
            NasTech_AI_windows_*_setup.exe

  # ─────────────────────────────────────────────
  # Linux x64 — tar.gz + AppImage + DEB + RPM
  # ─────────────────────────────────────────────
  linux:
    name: Linux x64 (tar.gz + AppImage + DEB + RPM)
    needs: meta
    runs-on: ubuntu-22.04
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config libgtk-3-dev \
            libgstreamer1.0-dev libunwind-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good \
            rpm patchelf file
          sudo apt-get install -y libfuse2 2>/dev/null || \
            sudo apt-get install -y libfuse2t64 2>/dev/null || true
          sudo apt-get install -y gstreamer1.0-plugins-bad 2>/dev/null || true
          sudo apt-get install -y libkeybinder-3.0-dev 2>/dev/null || true
          sudo apt-get install -y libayatana-appindicator3-dev 2>/dev/null || true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Inject fallback key
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Resolve version numbers
        env:
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          echo "TAG=$TAG" >> $GITHUB_ENV
          RAW=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "VERSION_NUMBER=$(echo $RAW | cut -d'+' -f1)" >> $GITHUB_ENV

      - name: Build Linux
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "../../../../../NasTech_AI_linux_${TAG}.tar.gz" .

      - name: Package AppImage
        run: |
          wget -q -O appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

          mkdir -p AppDir/usr/{bin,lib,share/icons/hicolor/256x256/apps}
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/nastechai" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          cat > AppDir/nastechai.desktop <<DESK
          [Desktop Entry]
          Name=NasTech AI
          Exec=nastechai
          Icon=nastechai
          Type=Application
          Categories=Utility;
          DESK

          ICON="linux/nastechai.png"
          [ ! -f "$ICON" ] && ICON="assets/app_icon.png"
          install -Dm644 "$ICON" AppDir/nastechai.png
          install -Dm644 "$ICON" AppDir/usr/share/icons/hicolor/256x256/apps/nastechai.png

          ARCH=x86_64 ./appimagetool AppDir "NasTech_AI_linux_${TAG}.AppImage"

      - name: Package DEB
        run: |
          mkdir -p deb/{DEBIAN,opt/nastechai,usr/{bin,share/{applications,icons/hicolor/256x256/apps}}}
          cp -r build/linux/x64/release/bundle/* deb/opt/nastechai/
          ln -s /opt/nastechai/nastechai deb/usr/bin/nastechai

          cat > deb/DEBIAN/control <<CTRL
          Package: nastechai
          Version: ${VERSION_NUMBER}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: NasTech AI <support@nastechai.com>
          Depends: libgtk-3-0, libstdc++6, libglu1-mesa, libgstreamer1.0-0, libgstreamer-plugins-base1.0-0, libglib2.0-0, libc6
          Description: NasTech AI — LLM Chat Client
           A cross-platform Flutter LLM chat client.
          CTRL

          cat > deb/usr/share/applications/nastechai.desktop <<DESK
          [Desktop Entry]
          Name=NasTech AI
          Exec=/opt/nastechai/nastechai
          Icon=nastechai
          Type=Application
          Categories=Utility;
          DESK

          ICON="linux/nastechai.png"
          [ ! -f "$ICON" ] && ICON="assets/app_icon.png"
          install -Dm644 "$ICON" deb/usr/share/icons/hicolor/256x256/apps/nastechai.png

          cat > deb/opt/nastechai/nastechai.sh <<'SH'
          #!/bin/bash
          cd "$(dirname "$0")"
          ./nastechai "$@"
          SH
          chmod +x deb/opt/nastechai/nastechai.sh

          dpkg-deb --build deb "NasTech_AI_linux_${TAG}_amd64.deb"

      - name: Package RPM
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p nastechai-${VERSION_NUMBER}
          cp -r build/linux/x64/release/bundle/* nastechai-${VERSION_NUMBER}/

          ICON="linux/nastechai.png"
          [ ! -f "$ICON" ] && ICON="assets/app_icon.png"
          cp "$ICON" nastechai-${VERSION_NUMBER}/nastechai.png
          tar -czf ~/rpmbuild/SOURCES/nastechai-${VERSION_NUMBER}.tar.gz nastechai-${VERSION_NUMBER}

          cat > ~/rpmbuild/SPECS/nastechai.spec <<SPEC
          Name:           nastechai
          Version:        ${VERSION_NUMBER}
          Release:        1%{?dist}
          Summary:        NasTech AI — LLM Chat Client
          License:        MIT
          Source0:        %{name}-%{version}.tar.gz
          BuildArch:      x86_64
          Requires:       gtk3, libstdc++ >= 6, mesa-libGLU, gstreamer1, gstreamer1-plugins-base, glib2, glibc

          %description
          A cross-platform Flutter LLM chat client.

          %prep
          %setup -q

          %install
          mkdir -p %{buildroot}/opt/nastechai
          cp -r * %{buildroot}/opt/nastechai/
          mkdir -p %{buildroot}/usr/bin
          ln -s /opt/nastechai/nastechai %{buildroot}/usr/bin/nastechai
          mkdir -p %{buildroot}/usr/share/applications
          cat > %{buildroot}/usr/share/applications/nastechai.desktop <<'DEOF'
          [Desktop Entry]
          Name=NasTech AI
          Exec=/opt/nastechai/nastechai
          Icon=nastechai
          Type=Application
          Categories=Utility;
          DEOF
          mkdir -p %{buildroot}/usr/share/icons/hicolor/256x256/apps
          cp nastechai.png %{buildroot}/usr/share/icons/hicolor/256x256/apps/nastechai.png

          %files
          /opt/nastechai/*
          /usr/bin/nastechai
          /usr/share/applications/nastechai.desktop
          /usr/share/icons/hicolor/256x256/apps/nastechai.png

          %changelog
          * $(date "+%a %b %d %Y") NasTech AI <support@nastechai.com> - ${VERSION_NUMBER}-1
          - Release ${TAG}
          SPEC

          rpmbuild -bb ~/rpmbuild/SPECS/nastechai.spec
          cp ~/rpmbuild/RPMS/x86_64/nastechai-${VERSION_NUMBER}-1.*.rpm \
             "NasTech_AI_linux_${TAG}.rpm"

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: Linux-tar.gz
          path: NasTech_AI_linux_*.tar.gz

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Linux-AppImage
          path: NasTech_AI_linux_*.AppImage

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: Linux-DEB
          path: NasTech_AI_linux_*_amd64.deb

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: Linux-RPM
          path: NasTech_AI_linux_*.rpm

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          draft: ${{ needs.meta.outputs.draft }}
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          files: |
            NasTech_AI_linux_*.tar.gz
            NasTech_AI_linux_*.AppImage
            NasTech_AI_linux_*_amd64.deb
            NasTech_AI_linux_*.rpm

  # ─────────────────────────────────────────────
  # Linux ARM64 — tar.gz + DEB
  # ─────────────────────────────────────────────
  linux-arm64:
    name: Linux ARM64 (tar.gz + DEB)
    needs: meta
    runs-on: ubuntu-22.04-arm
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config libgtk-3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good \
            rpm patchelf file libunwind-dev
          sudo apt-get install -y libfuse2 2>/dev/null || \
            sudo apt-get install -y libfuse2t64 2>/dev/null || true
          sudo apt-get install -y gstreamer1.0-plugins-bad 2>/dev/null || true
          sudo apt-get install -y libkeybinder-3.0-dev 2>/dev/null || true
          sudo apt-get install -y libayatana-appindicator3-dev 2>/dev/null || true

      - name: Setup Flutter (ARM64 — git clone, no binary download)
        run: |
          git clone https://github.com/flutter/flutter.git --branch stable --depth 1 $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          $HOME/flutter/bin/flutter precache --linux
          $HOME/flutter/bin/flutter doctor -v

      - name: Inject fallback key
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Resolve version numbers
        env:
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          echo "TAG=$TAG" >> $GITHUB_ENV
          RAW=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "VERSION_NUMBER=$(echo $RAW | cut -d'+' -f1)" >> $GITHUB_ENV

      - name: Build Linux ARM64
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          cd build/linux/arm64/release/bundle 2>/dev/null || cd build/linux/x64/release/bundle
          tar -czf "../../../../../NasTech_AI_linux_arm64_${TAG}.tar.gz" .

      - name: Package DEB
        run: |
          mkdir -p deb/{DEBIAN,opt/nastechai,usr/{bin,share/{applications,icons/hicolor/256x256/apps}}}
          BUNDLE="build/linux/arm64/release/bundle"
          [ ! -d "$BUNDLE" ] && BUNDLE="build/linux/x64/release/bundle"
          cp -r $BUNDLE/* deb/opt/nastechai/
          ln -s /opt/nastechai/nastechai deb/usr/bin/nastechai

          cat > deb/DEBIAN/control <<CTRL
          Package: nastechai
          Version: ${VERSION_NUMBER}
          Section: utils
          Priority: optional
          Architecture: arm64
          Maintainer: NasTech AI <support@nastechai.com>
          Depends: libgtk-3-0, libstdc++6, libgstreamer1.0-0, libgstreamer-plugins-base1.0-0, libglib2.0-0, libc6
          Description: NasTech AI — LLM Chat Client
           A cross-platform Flutter LLM chat client.
          CTRL

          cat > deb/usr/share/applications/nastechai.desktop <<DESK
          [Desktop Entry]
          Name=NasTech AI
          Exec=/opt/nastechai/nastechai
          Icon=nastechai
          Type=Application
          Categories=Utility;
          DESK

          ICON="linux/nastechai.png"
          [ ! -f "$ICON" ] && ICON="assets/app_icon.png"
          install -Dm644 "$ICON" deb/usr/share/icons/hicolor/256x256/apps/nastechai.png
          dpkg-deb --build deb "NasTech_AI_linux_arm64_${TAG}.deb"

      - name: Upload tar.gz (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: Linux-ARM64-tar.gz
          path: NasTech_AI_linux_arm64_*.tar.gz

      - name: Upload DEB (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: Linux-ARM64-DEB
          path: NasTech_AI_linux_arm64_*.deb

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          draft: ${{ needs.meta.outputs.draft }}
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          files: |
            NasTech_AI_linux_arm64_*.tar.gz
            NasTech_AI_linux_arm64_*.deb

  # ─────────────────────────────────────────────
  # Web — Flutter web build committed back to repo
  # ─────────────────────────────────────────────
  web:
    name: Web (Flutter → build/web)
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Inject fallback key
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Flutter Web
        env:
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          flutter build web \
            --release \
            --base-href / \
            --dart-define=APP_NAME="NasTech AI" \
            --dart-define=APP_PACKAGE_ID="com.nastechai.app" \
            --dart-define=APP_VERSION="${TAG}"

      - name: Stamp build metadata
        env:
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          cat > build/web/build-info.json <<EOF
          {
            "app": "NasTech AI",
            "packageId": "com.nastechai.app",
            "version": "${TAG}",
            "commit": "${{ github.sha }}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "branch": "${{ github.ref_name }}"
          }
          EOF

      - name: Commit and push build/web
        env:
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          git config user.name  "NasTech AI CI"
          git config user.email "ci@nastechai.com"
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          # Save freshly built files before any git operations
          cp -r build/web /tmp/web_build_artifact

          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            # Always start from the latest remote state
            git fetch origin master
            git reset --hard origin/master

            # Restore the freshly built files on top of latest master
            cp -r /tmp/web_build_artifact/. build/web/

            git add -f build/web/
            if git diff --staged --quiet; then
              echo "No changes to commit — web build is identical to master."
              exit 0
            fi

            git commit -m "chore(web): build ${TAG} [skip ci]"

            if git push origin master; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi

            echo "Push rejected on attempt $i/$MAX_RETRIES — another runner pushed first. Retrying in $((i * 3))s..."
            git reset --soft HEAD^
            sleep $((i * 3))
          done

          echo "All $MAX_RETRIES push attempts failed."
          exit 1

      - name: Upload web artifact (ZIP)
        run: |
          cd build/web
          zip -r "../../NasTech_AI_web_${{ needs.meta.outputs.tag }}.zip" .
        continue-on-error: true

      - name: Upload web ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Web-ZIP
          path: NasTech_AI_web_*.zip
        continue-on-error: true

      - name: Publish web ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          draft: ${{ needs.meta.outputs.draft }}
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          files: NasTech_AI_web_*.zip
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Summary — prints download table after all done
  # ─────────────────────────────────────────────
  summary:
    name: Release Summary
    needs: [meta, android, ios, macos, windows, linux, linux-arm64, web]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print release summary
        env:
          TAG: ${{ needs.meta.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          echo "## NasTech AI Release ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Android (APK + AAB) | ${{ needs.android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS (IPA) | ${{ needs.ios.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS (DMG) | ${{ needs.macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows (ZIP + Installer) | ${{ needs.windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64 (tar.gz/AppImage/DEB/RPM) | ${{ needs.linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux ARM64 (tar.gz/DEB) | ${{ needs.linux-arm64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web | ${{ needs.web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Release](https://github.com/${REPO}/releases/tag/${TAG})" >> $GITHUB_STEP_SUMMARY
