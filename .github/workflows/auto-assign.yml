name: Auto Assign

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  auto-assign:
    name: Auto-assign to author on PR open
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Assign PR to author
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const assignee = context.payload.pull_request.user.login;
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: context.payload.pull_request.number,
              assignees: [assignee],
            });
            core.info(`Assigned PR #${context.payload.pull_request.number} to @${assignee}`);
