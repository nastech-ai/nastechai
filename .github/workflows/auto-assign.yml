name: Auto Assign

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  auto-assign:
    name: Auto-assign to author on PR open
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR to author
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const assignee = context.payload.pull_request.user.login;

            // Skip bots — GitHub does not allow assigning bot accounts
            if (assignee.endsWith('[bot]') || assignee === 'dependabot') {
              core.info(`Skipping bot author: @${assignee}`);
              return;
            }

            try {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: context.payload.pull_request.number,
                assignees: [assignee],
              });
              core.info(`✅ Assigned PR #${context.payload.pull_request.number} to @${assignee}`);
            } catch (err) {
              core.warning(`Could not assign PR to @${assignee}: ${err.message}`);
            }
