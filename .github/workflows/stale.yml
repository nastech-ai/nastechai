name: Stale Bot

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale issues & PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

          # ── Issues ──────────────────────────────────────
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          close-issue-label: 'auto-closed'
          stale-issue-message: >
            This issue has been inactive for 60 days and is now marked stale.
            If it is still relevant please leave a comment or remove the `stale` label.
            It will be closed in 14 days if there is no further activity.
          close-issue-message: >
            This issue was automatically closed after 14 days of inactivity.
            Feel free to reopen it if the problem persists.

          # ── Pull Requests ────────────────────────────────
          days-before-pr-stale: 30
          days-before-pr-close: 10
          stale-pr-label: 'stale'
          close-pr-label: 'auto-closed'
          stale-pr-message: >
            This pull request has been inactive for 30 days and is now marked stale.
            Please rebase, address review comments, or leave a comment to keep it open.
            It will be closed in 10 days if there is no further activity.
          close-pr-message: >
            This pull request was automatically closed after 10 days of inactivity.
            Please reopen if you want to continue working on it.

          # ── Exemptions ──────────────────────────────────
          exempt-issue-labels: 'pinned,security,roadmap,wontfix'
          exempt-pr-labels: 'pinned,security,do-not-merge'
          exempt-all-milestones: true
