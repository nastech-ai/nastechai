version: 2

updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: 'chore(ci)'

  # Flutter / Dart pub packages
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - flutter
    commit-message:
      prefix: 'chore(deps)'
    open-pull-requests-limit: 10
